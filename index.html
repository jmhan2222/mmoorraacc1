<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>morrac x Flink | 티 타임 타임머신</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="morrac-bg text-[#3A3530] min-h-screen flex flex-col antialiased">

    <header class="bg-white/80 backdrop-blur-md border-b border-[#EFECE6] px-6 py-5 sticky top-0 z-50 flex items-center">
        <div>
            <h1 class="text-[10px] tracking-[0.2em] text-[#A8A095] font-medium uppercase">morrac x Flink</h1>
            <p class="text-base font-serif font-semibold text-[#2C3E2B] mt-0.5">티 타임 타임머신</p>
        </div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-6 flex flex-col justify-center">

        <div class="w-full bg-white rounded-3xl border border-[#EFECE6] card-lifted overflow-hidden">

            <!-- 16:9 모래시계 프레임 -->
            <div class="hourglass-frame">
                <div class="hourglass-inner">
                    <!--
                        SVG viewBox: 0 0 120 220
                        Top chamber   : y=10 → y=107  (height=97)
                        Neck          : y=107 → y=113
                        Bottom chamber: y=113 → y=210  (height=97)
                    -->
                    <svg id="hourglass-svg"
                         viewBox="0 0 120 220"
                         xmlns="http://www.w3.org/2000/svg"
                         class="hourglass-svg-el">

                        <defs>
                            <!-- 위 챔버 클립 -->
                            <clipPath id="clip-top">
                                <polygon points="10,10 110,10 65,107 55,107"/>
                            </clipPath>
                            <!-- 아래 챔버 클립 -->
                            <clipPath id="clip-bottom">
                                <polygon points="55,113 65,113 110,210 10,210"/>
                            </clipPath>
                        </defs>

                        <!-- 아래 모래 (바닥에서 쌓임) -->
                        <rect id="sand-bottom"
                              x="0" y="210" width="120" height="0"
                              clip-path="url(#clip-bottom)"
                              fill="var(--sand-color)"/>

                        <!-- 위 모래 (처음에 가득) -->
                        <rect id="sand-top"
                              x="0" y="10" width="120" height="97"
                              clip-path="url(#clip-top)"
                              fill="var(--sand-color)"/>

                        <!-- 모래 흐름 (목 부분) -->
                        <rect id="sand-stream"
                              x="57" y="107" width="6" height="6"
                              fill="var(--sand-color)" opacity="1"/>

                        <!-- 유리 테두리: 위 챔버 -->
                        <line x1="10"  y1="10"  x2="110" y2="10"  stroke="var(--glass-line)" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10"  y1="10"  x2="55"  y2="107" stroke="var(--glass-line)" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="110" y1="10"  x2="65"  y2="107" stroke="var(--glass-line)" stroke-width="1.5" stroke-linecap="round"/>

                        <!-- 목 -->
                        <line x1="55" y1="107" x2="55" y2="113" stroke="var(--glass-line)" stroke-width="1.5"/>
                        <line x1="65" y1="107" x2="65" y2="113" stroke="var(--glass-line)" stroke-width="1.5"/>

                        <!-- 유리 테두리: 아래 챔버 -->
                        <line x1="55"  y1="113" x2="10"  y2="210" stroke="var(--glass-line)" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="65"  y1="113" x2="110" y2="210" stroke="var(--glass-line)" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="10"  y1="210" x2="110" y2="210" stroke="var(--glass-line)" stroke-width="1.5" stroke-linecap="round"/>

                        <!--
                            1분 30초(90초, 50%) 표시점
                            위 챔버 50% 높이 y=58.5:
                              왼쪽 벽 x = 10 + 45*(48.5/97) ≈ 32.5
                              오른쪽 벽 x = 110 − 22.5 ≈ 87.5
                            아래 챔버 50% 높이 y=161.5:
                              같은 x 좌표 대칭
                        -->
                        <circle cx="33"  cy="58"  r="2.2" fill="var(--glass-line)" opacity="0.32"/>
                        <circle cx="87"  cy="58"  r="2.2" fill="var(--glass-line)" opacity="0.32"/>
                        <circle cx="33"  cy="162" r="2.2" fill="var(--glass-line)" opacity="0.32"/>
                        <circle cx="87"  cy="162" r="2.2" fill="var(--glass-line)" opacity="0.32"/>

                    </svg>
                </div>
            </div>

            <!-- 타이머 표시 + 뒤집기 버튼 -->
            <div class="px-6 py-5 flex flex-col items-center gap-4 bg-white">
                <p id="timer-display" class="text-3xl font-mono font-light tracking-widest text-[#3A3530]">3:00</p>
                <button id="flip-btn" disabled class="flip-btn">뒤집기</button>
            </div>

        </div>
    </main>

    <script>
        const TOTAL = 180;
        let timeLeft = TOTAL;
        let timerInterval = null;
        let flipping = false;

        const sandTop    = document.getElementById('sand-top');
        const sandBottom = document.getElementById('sand-bottom');
        const sandStream = document.getElementById('sand-stream');
        const timerDisp  = document.getElementById('timer-display');
        const flipBtn    = document.getElementById('flip-btn');
        const svg        = document.getElementById('hourglass-svg');

        /* 모래 위치/크기와 타이머 텍스트를 ratio에 따라 갱신 */
        function renderSand() {
            const ratio = timeLeft / TOTAL; // 1.0 = 위 가득, 0.0 = 위 비어있음

            // 위 챔버 (y=10 ~ y=107, 높이=97)
            const topH = 97 * ratio;
            sandTop.setAttribute('y',      String(10 + 97 * (1 - ratio)));
            sandTop.setAttribute('height', String(topH));

            // 아래 챔버 (y=113 ~ y=210, 높이=97)
            const botH = 97 * (1 - ratio);
            sandBottom.setAttribute('y',      String(210 - botH));
            sandBottom.setAttribute('height', String(botH));

            // 모래 흐름
            sandStream.setAttribute('opacity', (timeLeft > 0 && !flipping) ? '1' : '0');

            // 타이머 텍스트
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerDisp.textContent = m + ':' + String(s).padStart(2, '0');

            // 뒤집기 버튼 활성화 (타이머 0일 때만)
            if (timeLeft === 0 && !flipping) {
                flipBtn.disabled = false;
                flipBtn.classList.add('flip-btn--ready');
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    renderSand();
                } else {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    renderSand();
                }
            }, 1000);
        }

        flipBtn.addEventListener('click', () => {
            if (timeLeft !== 0 || flipping) return;

            flipping = true;
            flipBtn.disabled = true;
            flipBtn.classList.remove('flip-btn--ready');
            sandStream.setAttribute('opacity', '0');

            /* 360° 회전 애니메이션 */
            svg.style.transition = 'transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
            svg.style.transform  = 'rotate(360deg)';

            setTimeout(() => {
                svg.style.transition = 'none';
                svg.style.transform  = 'none';

                timeLeft = TOTAL;
                flipping = false;
                renderSand();
                startTimer();
            }, 1200);
        });

        /* 페이지 로드 즉시 시작 */
        renderSand();
        startTimer();
    </script>
</body>
</html>
