<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>mmoorraacc — 모락모락 모래시계</title>
<style>
:root{ --bg:#EEEAE4; --ink:#3A332A; --sub:#9A8E82; --stroke:#BEB0A0; }
*{box-sizing:border-box;margin:0;padding:0;}
body{
  height:100svh;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);
  font-family:-apple-system,"Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
}

/* ── 모래시계 화면 ── */
#mainScreen{
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

/* 상단 타이틀 */
.title-block{text-align:center;margin-bottom:20px;}
.brand{font-size:17px;font-weight:600;letter-spacing:.26em;color:var(--ink);display:block;}
.subtitle{font-size:10px;letter-spacing:.25em;color:var(--sub);margin-top:5px;display:block;}

.hg-wrap{width:min(56vw,190px);flex-shrink:0;}
.hg-wrap svg{width:100%;height:auto;display:block;overflow:visible;}

.controls{display:flex;flex-direction:column;align-items:center;gap:9px;margin-top:16px;}
.readout{font-size:16px;letter-spacing:.14em;font-variant-numeric:tabular-nums;
  color:var(--ink);opacity:.48;}
.flip-btn{
  width:44px;height:44px;border-radius:50%;
  border:1.5px solid rgba(120,100,80,.20);
  background:rgba(255,255,255,.50);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.05);
  transition:transform .14s;
}
.flip-btn:active{transform:scale(.9);}
.flip-btn svg{width:18px;height:18px;stroke:#8A7560;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;}

/* ── 완료 화면 ── */
#doneScreen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  opacity:0;pointer-events:none;
  transition:opacity .9s ease;
  z-index:100;gap:0;
}
#doneScreen.active{opacity:1;pointer-events:auto;}

/* 연기 SVG */
.steam-svg{width:min(60vw,200px);height:auto;display:block;margin-bottom:0;}

/* 완료 텍스트 */
.done-brand{
  font-size:20px;font-weight:700;letter-spacing:.24em;
  color:var(--ink);display:block;text-align:center;margin-top:6px;
}
.done-sub{
  font-size:10px;letter-spacing:.22em;color:var(--sub);
  margin-top:5px;display:block;text-align:center;
}
.done-msg{
  font-size:12px;letter-spacing:.08em;color:var(--sub);
  margin-top:18px;text-align:center;line-height:1.8;
}
.restart-btn{
  margin-top:22px;width:44px;height:44px;border-radius:50%;
  border:1.5px solid rgba(120,100,80,.22);
  background:rgba(255,255,255,.55);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.06);
  transition:transform .14s;
}
.restart-btn:active{transform:scale(.9);}
.restart-btn svg{width:18px;height:18px;stroke:#8A7560;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;}

/* ── 모락모락 연기 ── */
.wisp{
  opacity:0;
  animation:wispUp var(--wd,2.8s) ease-in-out var(--wdl,0s) infinite;
}
@keyframes wispUp{
  0%  {transform:translateY(10px);opacity:0;}
  18% {opacity:.68;}
  78% {opacity:.32;}
  100%{transform:translateY(-16px);opacity:0;}
}

/* ── 모래시계 회전 ── */
#hgRoot{transform-box:fill-box;transform-origin:50% 50%;}
#hgRoot.spin{animation:hgspin .8s cubic-bezier(.45,0,.55,1) forwards;}
@keyframes hgspin{0%{transform:rotate(0);}100%{transform:rotate(180deg);}}

/* ── 모래 입자 ── */
.gn{animation:gnfall var(--gd,.38s) linear var(--gdelay,0s) infinite;opacity:0;}
@keyframes gnfall{
  0%  {opacity:0;transform:translate(var(--gx0,0px),0);}
  7%  {opacity:.88;}88%{opacity:.70;}
  100%{opacity:0;transform:translate(var(--gx1,0px),var(--gy,20px));}
}
.gs{animation:gsfall var(--sd,.48s) ease-in var(--sdelay,0s) infinite;opacity:0;}
@keyframes gsfall{
  0%{opacity:0;transform:translate(0,0);}10%{opacity:.75;}
  100%{opacity:0;transform:translate(var(--sx,0px),var(--sy,22px));}
}
[data-state=done] .gn,[data-state=done] .gs{animation-play-state:paused;opacity:0;}
@media(prefers-reduced-motion:reduce){
  .gn,.gs,.wisp{animation:none!important;opacity:0!important;}
  #hgRoot.spin{animation:none!important;}
}
</style>
</head>
<body>

<!-- ═══════ 모래시계 화면 ═══════ -->
<div id="mainScreen">

  <!-- 상단 타이틀 -->
  <div class="title-block">
    <span class="brand">mmoorraacc</span>
    <span class="subtitle">모락모락 모래시계</span>
  </div>

  <!-- 모래시계 -->
  <div class="hg-wrap" id="widget" data-state="running">
  <svg viewBox="0 0 240 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cTop">
      <path d="M 120,26 C 198,26 226,88 226,148 C 226,206 176,244 128,254
               L 112,254 C 64,244 14,206 14,148 C 14,88 42,26 120,26 Z"/>
    </clipPath>
    <clipPath id="cBot">
      <path d="M 112,266 L 128,266 C 176,276 226,314 226,372
               C 226,448 180,494 120,494 C 60,494 14,448 14,372
               C 14,314 64,276 112,266 Z"/>
    </clipPath>
    <clipPath id="cNeck">
      <rect x="109" y="250" width="22" height="18"/>
    </clipPath>
    <clipPath id="cSpread">
      <path d="M 112,266 L 128,266 C 176,276 226,314 226,372
               C 226,448 180,494 120,494 C 60,494 14,448 14,372
               C 14,314 64,276 112,266 Z"/>
    </clipPath>
    <!-- 모래 그라디언트 -->
    <linearGradient id="gSandT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#E2D0B2"/>
      <stop offset="100%" stop-color="#C8B28E"/>
    </linearGradient>
    <linearGradient id="gSandB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#CEBC96"/>
      <stop offset="100%" stop-color="#B89E7A"/>
    </linearGradient>
    <linearGradient id="gSurf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#EEE0C4" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#E2D0B2" stop-opacity="0"/>
    </linearGradient>
    <filter id="fBlur"><feGaussianBlur stdDeviation=".7"/></filter>
  </defs>

  <g id="hgRoot">
    <!-- 위 구슬 배경 -->
    <path d="M 120,26 C 198,26 226,88 226,148 C 226,206 176,244 128,254
             L 112,254 C 64,244 14,206 14,148 C 14,88 42,26 120,26 Z"
      fill="#EEEAE4"/>
    <!-- 위 모래 -->
    <rect id="topSand" x="4" y="26" width="232" height="228"
      fill="url(#gSandT)" clip-path="url(#cTop)" filter="url(#fBlur)"/>
    <rect id="topSandHL" x="4" y="26" width="232" height="14"
      fill="url(#gSurf)" clip-path="url(#cTop)" opacity=".8"/>
    <!-- 위 구슬 테두리 (깔끔한 단색) -->
    <path d="M 120,26 C 198,26 226,88 226,148 C 226,206 176,244 128,254
             L 112,254 C 64,244 14,206 14,148 C 14,88 42,26 120,26 Z"
      fill="none" stroke="var(--stroke)" stroke-width="2.0" stroke-linejoin="round"/>

    <!-- 50% 점 (위) -->
    <circle cx="120" cy="140" r="2.6" fill="#C07858" opacity=".60"/>

    <!-- 목 -->
    <rect x="112" y="254" width="16" height="12" fill="#EEEAE4"/>
    <line x1="112" y1="254" x2="112" y2="266" stroke="var(--stroke)" stroke-width="1.8"/>
    <line x1="128" y1="254" x2="128" y2="266" stroke="var(--stroke)" stroke-width="1.8"/>

    <!-- 목 통과 모래 알갱이 -->
    <g id="grainGroup" clip-path="url(#cNeck)">
      <ellipse class="gn" cx="120" cy="252" rx="2.2" ry="3.0" fill="#CCBA96"
        style="--gd:.36s;--gdelay:0s;   --gx0:0px; --gx1:0px; --gy:18px"/>
      <ellipse class="gn" cx="119" cy="251" rx="1.8" ry="2.4" fill="#DDD0A8"
        style="--gd:.41s;--gdelay:.06s; --gx0:0px; --gx1:0px; --gy:20px"/>
      <ellipse class="gn" cx="121" cy="253" rx="1.4" ry="2.0" fill="#C4AC84"
        style="--gd:.34s;--gdelay:.13s; --gx0:0px; --gx1:0px; --gy:17px"/>
      <circle class="gn" cx="117" cy="252" r="1.4" fill="#D4C298"
        style="--gd:.44s;--gdelay:.20s; --gx0:-1px;--gx1:-2px;--gy:19px"/>
      <circle class="gn" cx="123" cy="252" r="1.2" fill="#E0CC9E"
        style="--gd:.38s;--gdelay:.28s; --gx0:1px; --gx1:2px; --gy:18px"/>
      <circle class="gn" cx="118" cy="250" r="1.0" fill="#C8B48A"
        style="--gd:.46s;--gdelay:.35s; --gx0:-1px;--gx1:-1px;--gy:21px"/>
      <circle class="gn" cx="122" cy="254" r="1.0" fill="#D8C89C"
        style="--gd:.40s;--gdelay:.42s; --gx0:1px; --gx1:2px; --gy:16px"/>
      <circle class="gn" cx="116" cy="253" r=".8"  fill="#CCBE90"
        style="--gd:.50s;--gdelay:.09s; --gx0:-2px;--gx1:-2px;--gy:22px"/>
      <circle class="gn" cx="124" cy="251" r=".8"  fill="#DDD0A0"
        style="--gd:.43s;--gdelay:.17s; --gx0:2px; --gx1:2px; --gy:19px"/>
      <circle class="gn" cx="115" cy="251" r=".7"  fill="#D2C49A"
        style="--gd:.48s;--gdelay:.32s; --gx0:-2px;--gx1:-3px;--gy:20px"/>
      <circle class="gn" cx="125" cy="253" r=".6"  fill="#CAB88C"
        style="--gd:.42s;--gdelay:.56s; --gx0:2px; --gx1:3px; --gy:18px"/>
    </g>

    <!-- 아래 퍼지는 알갱이 -->
    <g id="spreadGroup" clip-path="url(#cSpread)">
      <circle class="gs" cx="120" cy="268" r="1.2" fill="#CCBA96"
        style="--sd:.50s;--sdelay:.04s;--sx:-9px;--sy:20px"/>
      <circle class="gs" cx="120" cy="268" r="1.0" fill="#DDD0A8"
        style="--sd:.44s;--sdelay:.14s;--sx:10px;--sy:18px"/>
      <circle class="gs" cx="120" cy="268" r=".9"  fill="#C4AC84"
        style="--sd:.56s;--sdelay:.24s;--sx:-13px;--sy:25px"/>
      <circle class="gs" cx="120" cy="268" r=".8"  fill="#D4C296"
        style="--sd:.48s;--sdelay:.38s;--sx:14px;--sy:22px"/>
      <circle class="gs" cx="120" cy="268" r=".8"  fill="#C8B48A"
        style="--sd:.46s;--sdelay:.46s;--sx:-6px;--sy:26px"/>
      <circle class="gs" cx="120" cy="268" r=".7"  fill="#D8C898"
        style="--sd:.52s;--sdelay:.08s;--sx:7px;--sy:24px"/>
    </g>

    <!-- 아래 구슬 배경 -->
    <path d="M 112,266 L 128,266 C 176,276 226,314 226,372
             C 226,448 180,494 120,494 C 60,494 14,448 14,372
             C 14,314 64,276 112,266 Z"
      fill="#EEEAE4"/>
    <!-- 아래 모래 -->
    <rect id="botSand" x="4" y="494" width="232" height="0"
      fill="url(#gSandB)" clip-path="url(#cBot)" filter="url(#fBlur)"/>
    <rect id="botSandHL" x="4" y="486" width="232" height="12"
      fill="url(#gSurf)" clip-path="url(#cBot)" opacity=".45"/>
    <!-- 아래 구슬 테두리 -->
    <path d="M 112,266 L 128,266 C 176,276 226,314 226,372
             C 226,448 180,494 120,494 C 60,494 14,448 14,372
             C 14,314 64,276 112,266 Z"
      fill="none" stroke="var(--stroke)" stroke-width="2.0" stroke-linejoin="round"/>

    <!-- 50% 점 (아래) -->
    <circle cx="120" cy="380" r="2.6" fill="#C07858" opacity=".60"/>
  </g>
  </svg>
  </div>

  <div class="controls">
    <div class="readout" id="readout">03:00</div>
    <button class="flip-btn" onclick="doFlip()" aria-label="뒤집기">
      <svg viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
        <polyline points="21 3 21 9 15 9"/>
      </svg>
    </button>
  </div>
</div><!-- /mainScreen -->


<!-- ═══════ 완료 화면 ═══════ -->
<div id="doneScreen">

  <!-- 모락모락 연기 SVG -->
  <svg class="steam-svg" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
    <!-- 5개의 S형 연기 곡선 -->
    <path class="wisp" style="--wd:3.0s;--wdl:0s"
      d="M 60,95 C 50,74 66,56 54,38 C 42,20 58,4 46,-14"
      fill="none" stroke="var(--ink)" stroke-width="2.4" stroke-linecap="round" stroke-opacity=".65"/>
    <path class="wisp" style="--wd:2.8s;--wdl:.7s"
      d="M 82,95 C 94,74 78,56 90,38 C 102,20 86,4 98,-14"
      fill="none" stroke="var(--ink)" stroke-width="2.1" stroke-linecap="round" stroke-opacity=".58"/>
    <path class="wisp" style="--wd:3.2s;--wdl:1.4s"
      d="M 100,95 C 90,74 106,56 94,38 C 82,20 98,4 86,-14"
      fill="none" stroke="var(--ink)" stroke-width="1.9" stroke-linecap="round" stroke-opacity=".50"/>
    <path class="wisp" style="--wd:2.9s;--wdl:.35s"
      d="M 120,95 C 132,74 116,56 128,38 C 140,20 124,4 136,-14"
      fill="none" stroke="var(--ink)" stroke-width="1.7" stroke-linecap="round" stroke-opacity=".44"/>
    <path class="wisp" style="--wd:3.1s;--wdl:1.0s"
      d="M 142,95 C 132,74 148,56 136,38 C 124,20 140,4 128,-14"
      fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linecap="round" stroke-opacity=".36"/>
  </svg>

  <!-- 로고 텍스트 -->
  <span class="done-brand">mmoorraacc</span>
  <span class="done-sub">모락모락 모래시계</span>

  <!-- 문구 -->
  <p class="done-msg">
    차가 완성되었어요<br>
    잔에 나눠 담아 천천히 즐겨보세요
  </p>

  <!-- 다시 시작 -->
  <button class="restart-btn" onclick="restart()" aria-label="다시 시작">
    <svg viewBox="0 0 24 24">
      <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
      <polyline points="21 3 21 9 15 9"/>
    </svg>
  </button>
</div>


<script>
(function(){
  var TOP_Y=26, NECK_TOP=254, BOT_NECK=266, BOT_Y=494, TOTAL=180;
  var widget    = document.getElementById('widget');
  var topSand   = document.getElementById('topSand');
  var topHL     = document.getElementById('topSandHL');
  var botSand   = document.getElementById('botSand');
  var botHL     = document.getElementById('botSandHL');
  var readout   = document.getElementById('readout');
  var hgRoot    = document.getElementById('hgRoot');
  var grainGrp  = document.getElementById('grainGroup');
  var spreadGrp = document.getElementById('spreadGroup');
  var doneScreen= document.getElementById('doneScreen');
  var startTime=null, rafId=null, lastSec=-1;

  function fmt(s){
    s=Math.max(0,s);
    return String(Math.floor(s/60)).padStart(2,'0')+':'+
           String(Math.floor(s%60)).padStart(2,'0');
  }

  function render(elapsed){
    var frac=Math.min(elapsed/TOTAL,1);
    var tH=Math.max((NECK_TOP-TOP_Y)*(1-frac),0), tY=NECK_TOP-tH;
    topSand.setAttribute('y',tY); topSand.setAttribute('height',tH); topHL.setAttribute('y',tY);
    var bH=Math.max((BOT_Y-BOT_NECK)*frac,0), bY=BOT_Y-bH;
    botSand.setAttribute('y',bY); botSand.setAttribute('height',bH); botHL.setAttribute('y',bY);
    grainGrp.style.opacity  = Math.max(0,1-frac*1.05);
    spreadGrp.style.opacity = Math.max(0,1-frac*1.05);
    var rem=Math.max(TOTAL-elapsed,0), cs=Math.ceil(rem);
    if(cs!==lastSec){ readout.textContent=fmt(rem); lastSec=cs; }
    if(frac>=1) finish();
  }

  function tick(now){
    var el=(now-startTime)/1000;
    if(el>=TOTAL){ render(TOTAL); return; }
    render(el); rafId=requestAnimationFrame(tick);
  }

  function start(){
    widget.dataset.state='running';
    if(rafId) cancelAnimationFrame(rafId);
    startTime=performance.now(); lastSec=-1;
    rafId=requestAnimationFrame(tick);
  }

  function finish(){
    widget.dataset.state='done';
    setTimeout(function(){ doneScreen.classList.add('active'); }, 400);
  }

  window.restart=function(){
    doneScreen.classList.remove('active');
    setTimeout(function(){ render(0); start(); }, 700);
  };

  window.doFlip=function(){
    if(rafId){ cancelAnimationFrame(rafId); rafId=null; }
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){ start(); return; }
    hgRoot.classList.remove('spin'); void hgRoot.offsetWidth;
    hgRoot.classList.add('spin');
    hgRoot.addEventListener('animationend',function h(){
      hgRoot.removeEventListener('animationend',h);
      hgRoot.classList.remove('spin'); start();
    });
  };

  start();
})();
</script>
</body>
</html>
